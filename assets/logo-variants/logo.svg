<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="figGrad" x1="40%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%"   stop-color="#7A0DAC"/>
      <stop offset="100%" stop-color="#C80060"/>
    </linearGradient>
    <linearGradient id="childGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#9A0A9A"/>
      <stop offset="100%" stop-color="#D40055"/>
    </linearGradient>
    <path id="topArc"    d="M 75,255 A 178,178 0 0,1 425,255"/>
    <path id="bottomArc" d="M 93,298 A 163,163 0 0,0 407,298"/>
  </defs>

  <!-- White background -->
  <circle cx="250" cy="250" r="244" fill="white"/>

  <!-- Outer border ring -->
  <circle cx="250" cy="250" r="240" fill="none" stroke="#6A0099" stroke-width="7"/>
  <!-- Inner border ring -->
  <circle cx="250" cy="250" r="224" fill="none" stroke="#6A0099" stroke-width="2.5"/>

  <!-- Decorative dashes beside MOTHER -->
  <line x1="100" y1="152" x2="122" y2="140" stroke="#6A0099" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="378" y1="140" x2="400" y2="152" stroke="#6A0099" stroke-width="2.5" stroke-linecap="round"/>

  <!-- MOTHER curved text -->
  <text font-family="Georgia, 'Times New Roman', serif" font-size="30"
        fill="#6A0099" font-weight="bold" letter-spacing="11">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">MOTHER</textPath>
  </text>

  <!-- HOSPITALS & IVF CENTRE curved text -->
  <text font-family="Georgia, 'Times New Roman', serif" font-size="17"
        fill="#6A0099" letter-spacing="3">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">HOSPITALS &amp; IVF CENTRE</textPath>
  </text>

  <!-- ====== MOTHER-CHILD FIGURE ====== -->

  <!-- MOTHER outer body — C-shape wrapping from right, forms outer shell of heart -->
  <path d="
    M 252,378
    C 230,358 185,322 165,282
    C 143,235 153,182 186,163
    C 203,153 222,155 237,166
    C 239,155 245,146 252,141
    L 252,220
    C 245,210 235,207 226,213
    C 208,224 205,252 218,275
    C 228,293 242,318 252,378 Z
  " fill="url(#figGrad)"/>

  <!-- MOTHER right half — completes the embrace -->
  <path d="
    M 252,141
    C 259,146 265,155 267,166
    C 282,155 301,153 318,163
    C 351,182 361,235 339,282
    C 319,322 274,358 252,378
    C 262,318 276,293 286,275
    C 299,252 296,224 278,213
    C 269,207 259,210 252,220
    Z
  " fill="url(#figGrad)"/>

  <!-- CHILD body — inner figure, lighter magenta, nestled inside mother -->
  <path d="
    M 252,360
    C 236,340 208,312 200,282
    C 190,246 202,214 222,206
    C 232,202 242,205 250,213
    C 252,205 256,198 252,198
    C 248,198 252,205 254,213
    C 262,205 272,202 282,206
    C 302,214 314,246 304,282
    C 296,312 268,340 252,360 Z
  " fill="url(#childGrad)" opacity="0.7"/>

  <!-- Inner heart outline — the embrace seam between the two figures -->
  <path d="
    M 252,350
    C 238,332 218,312 212,290
    C 204,262 214,238 232,232
    C 240,229 248,232 252,238
    C 256,232 264,229 272,232
    C 290,238 300,262 292,290
    C 286,312 266,332 252,350 Z
  " fill="none" stroke="white" stroke-width="3" opacity="0.6"/>

  <!-- Mother's head — upper RIGHT -->
  <circle cx="300" cy="152" r="25" fill="#7A0DAC"/>

  <!-- Child's head — upper LEFT, slightly smaller and lower -->
  <circle cx="204" cy="162" r="18" fill="#C80060"/>

  <!-- Small heart at centre-bottom -->
  <path d="
    M 252,340
    C 246,332 236,326 236,317
    C 236,310 241,305 247,305
    C 250,305 252,308 252,308
    C 252,308 254,305 257,305
    C 263,305 268,310 268,317
    C 268,326 258,332 252,340 Z
  " fill="white" opacity="0.85"/>

</svg>
