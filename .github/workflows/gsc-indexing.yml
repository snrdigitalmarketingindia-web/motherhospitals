name: IndexNow — Notify Google/Bing on Push

on:
  push:
    branches:
      - main
    paths:
      - "sitemap.xml"
      - "*.html"
      - "gsc-indexing/**"

  workflow_dispatch:   # Manual trigger from GitHub Actions tab

jobs:
  submit-indexnow:
    name: Submit sitemap URLs via IndexNow
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Submit all sitemap URLs via IndexNow
        run: |
          echo "Submitting $(grep -c '<loc>' sitemap.xml) URLs from sitemap.xml..."
          python gsc-indexing/submit_sitemap_urls.py
